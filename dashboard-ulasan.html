<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Ulasan - MentalHealth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecf2 100%);
        }

        /* Navigasi Kembali ke Utama */
        .back-nav {
            background: #4a6fa5;
            padding: 0.8rem 2rem;
        }
        .back-nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: opacity 0.3s;
        }
        .back-nav a:hover {
            opacity: 0.8;
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }
        .header p {
            color: #7f8c8d;
        }

        /* Tab Menu untuk Form dan Lihat Ulasan */
        .tab-menu {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 1rem;
        }
        .tab-link {
            background: none;
            border: none;
            padding: 0.7rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: #555;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .tab-link.active {
            background: #4a6fa5;
            color: white;
        }
        .tab-link:hover:not(.active) {
            background: #eef2f7;
        }

        /* Konten Tab */
        .tab-content {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        .tab-content.active-content {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== FORM ULASAN ========== */
        .review-form-card {
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #2c3e50;
        }
        .form-group label i {
            color: #4a6fa5;
            margin-right: 0.5rem;
        }
        .form-control {
            width: 100%;
            padding: 1rem 1.2rem;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: #4a6fa5;
        }

        /* Rating Bintang */
        .rating-container {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
            gap: 0.5rem;
        }
        .rating-container input {
            display: none;
        }
        .rating-container label {
            font-size: 2rem;
            color: #ddd;
            cursor: pointer;
            transition: all 0.2s;
        }
        .rating-container label:hover,
        .rating-container label:hover ~ label,
        .rating-container input:checked ~ label {
            color: #ffc107;
        }

        /* Tombol */
        .btn {
            background: #4a6fa5;
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn:hover {
            background: #3a5a87;
            transform: translateY(-3px);
        }

        /* Alert */
        .alert {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            display: none;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* ========== DAFTAR ULASAN ========== */
        .reviews-container {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .review-stats {
            display: flex;
            align-items: center;
            gap: 2rem;
            padding: 1.5rem;
            background: #eef2f7;
            border-radius: 15px;
            margin-bottom: 2rem;
        }
        .average-rating {
            text-align: center;
        }
        .average-number {
            font-size: 3rem;
            font-weight: 700;
            color: #2c3e50;
            line-height: 1;
        }
        .average-stars {
            color: #ffc107;
            font-size: 1.2rem;
            margin: 0.5rem 0;
        }
        .total-reviews {
            color: #7f8c8d;
        }
        .rating-bars {
            flex: 1;
        }
        .rating-bar-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }
        .rating-bar-item span {
            min-width: 60px;
        }
        .bar {
            flex: 1;
            height: 8px;
            background: #ddd;
            border-radius: 10px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: #4a6fa5;
            border-radius: 10px;
        }

        /* Filter Ulasan */
        .review-filter {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 0.5rem 1.2rem;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        .filter-btn:hover,
        .filter-btn.active {
            background: #4a6fa5;
            color: white;
            border-color: #4a6fa5;
        }

        /* Kartu Ulasan */
        .review-card {
            border-bottom: 1px solid #e0e0e0;
            padding: 1.5rem 0;
        }
        .review-card:last-child {
            border-bottom: none;
        }
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .reviewer-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .reviewer-avatar {
            width: 50px;
            height: 50px;
            background: #4a6fa5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
        }
        .reviewer-name {
            font-weight: 600;
            color: #2c3e50;
        }
        .review-date {
            color: #95a5a6;
            font-size: 0.85rem;
        }
        .review-rating {
            color: #ffc107;
            margin-bottom: 0.5rem;
        }
        .review-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #2c3e50;
        }
        .review-text {
            color: #555;
            margin-bottom: 1rem;
            line-height: 1.6;
        }
        .review-helpful {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .helpful-btn {
            background: none;
            border: 2px solid #e0e0e0;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .helpful-btn:hover {
            background: #eef2f7;
        }

        /* Load More */
        .load-more {
            text-align: center;
            margin-top: 2rem;
        }
        .load-more-btn {
            background: none;
            border: 2px solid #4a6fa5;
            color: #4a6fa5;
            padding: 0.7rem 2rem;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .load-more-btn:hover {
            background: #4a6fa5;
            color: white;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            color: #6c757d;
        }

        @media (max-width: 768px) {
            .review-stats {
                flex-direction: column;
                text-align: center;
            }
            .rating-bar-item span {
                min-width: 50px;
            }
        }
    </style>
</head>
<body>
    <!-- Navigasi Kembali ke Dashboard Utama -->
    <div class="back-nav">
        <a href="index.html"><i class="fas fa-arrow-left"></i> Kembali ke Dashboard Utama</a>
    </div>

    <div class="container">
        <div class="header">
            <h1><i class="fas fa-star"></i> Dashboard Ulasan</h1>
            <p>Bagikan pengalaman Anda menggunakan layanan MentalHealth</p>
        </div>

        <!-- Tab Menu -->
        <div class="tab-menu">
            <button class="tab-link active" onclick="openTab('tulis-ulasan')">
                <i class="fas fa-pen"></i> Tulis Ulasan
            </button>
            <button class="tab-link" onclick="openTab('lihat-ulasan')">
                <i class="fas fa-comments"></i> Lihat Semua Ulasan
            </button>
        </div>

        <!-- TAB 1: Form Tulis Ulasan -->
        <div id="tulis-ulasan" class="tab-content active-content">
            <div class="review-form-card">
                <h2 style="margin-bottom: 1.5rem; color: #2c3e50;">Bagikan Pengalaman Anda</h2>
                
                <!-- Alert untuk notifikasi -->
                <div id="alertMessage" class="alert"></div>

                <form id="reviewForm">
                    <!-- Nama -->
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Nama / Inisial</label>
                        <input type="text" class="form-control" id="nama" placeholder="Contoh: Andi P. atau Anonymous" required>
                    </div>

                    <!-- Email (opsional) -->
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email (Opsional)</label>
                        <input type="email" class="form-control" id="email" placeholder="Untuk konfirmasi ulasan">
                    </div>

                    <!-- Rating Bintang -->
                    <div class="form-group">
                        <label><i class="fas fa-star"></i> Rating Anda</label>
                        <div class="rating-container">
                            <input type="radio" name="rating" id="star5" value="5">
                            <label for="star5"><i class="fas fa-star"></i></label>
                            <input type="radio" name="rating" id="star4" value="4">
                            <label for="star4"><i class="fas fa-star"></i></label>
                            <input type="radio" name="rating" id="star3" value="3">
                            <label for="star3"><i class="fas fa-star"></i></label>
                            <input type="radio" name="rating" id="star2" value="2">
                            <label for="star2"><i class="fas fa-star"></i></label>
                            <input type="radio" name="rating" id="star1" value="5" checked>
                            <label for="star1"><i class="fas fa-star"></i></label>
                        </div>
                    </div>

                    <!-- Judul Ulasan -->
                    <div class="form-group">
                        <label><i class="fas fa-heading"></i> Judul Ulasan</label>
                        <input type="text" class="form-control" id="judul" placeholder="Ringkasan pengalaman Anda" required>
                    </div>

                    <!-- Isi Ulasan -->
                    <div class="form-group">
                        <label><i class="fas fa-comment"></i> Ulasan Lengkap</label>
                        <textarea class="form-control" id="ulasan" rows="5" placeholder="Ceritakan pengalaman Anda menggunakan layanan kami..." required></textarea>
                    </div>

                    <!-- Saran (opsional) -->
                    <div class="form-group">
                        <label><i class="fas fa-lightbulb"></i> Saran untuk Kami (Opsional)</label>
                        <textarea class="form-control" id="saran" rows="3" placeholder="Apa yang bisa kami tingkatkan?"></textarea>
                    </div>

                    <!-- Tombol Kirim -->
                    <button type="button" class="btn" onclick="simpanUlasan()">
                        <i class="fas fa-paper-plane"></i> Kirim Ulasan
                    </button>
                </form>

                <p style="text-align: center; margin-top: 1.5rem; color: #7f8c8d; font-size: 0.9rem;">
                    <i class="fas fa-shield-alt"></i> Ulasan Anda akan membantu kami meningkatkan kualitas layanan
                </p>
            </div>
        </div>

        <!-- TAB 2: Lihat Semua Ulasan -->
        <div id="lihat-ulasan" class="tab-content">
            <div class="reviews-container">
                <!-- Statistik Ulasan -->
                <div class="review-stats" id="reviewStats">
                    <!-- Akan diisi oleh JavaScript -->
                </div>

                <!-- Filter -->
                <div class="review-filter">
                    <button class="filter-btn active" onclick="filterUlasan('semua')">Semua</button>
                    <button class="filter-btn" onclick="filterUlasan(5)">5 Bintang</button>
                    <button class="filter-btn" onclick="filterUlasan(4)">4 Bintang</button>
                    <button class="filter-btn" onclick="filterUlasan(3)">3 Bintang</button>
                    <button class="filter-btn" onclick="filterUlasan(2)">2 Bintang</button>
                    <button class="filter-btn" onclick="filterUlasan(1)">1 Bintang</button>
                </div>

                <!-- Daftar Ulasan -->
                <div id="daftarUlasan">
                    <!-- Akan diisi oleh JavaScript -->
                </div>

                <!-- Tombol Load More -->
                <div class="load-more" id="loadMoreContainer">
                    <button class="load-more-btn" onclick="loadMoreUlasan()">Muat Lebih Banyak</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 MentalHealth. Bagikan pengalaman Anda untuk kebaikan bersama.</p>
    </footer>

    <script>
        // ========== DATA ULASAN (Simulasi Database) ==========
        let dataUlasan = [
                               {
                id: 5,
                nama: "Eka Putri",
                inisial: "EP",
                rating: 5,
                judul: "Terima Kasih MentalHealth!",
                ulasan: "Saya jadi lebih paham cara menjaga kesehatan mental setelah baca artikel-artikel di sini.",
                tanggal: "2024-03-11",
                helpful: 20,
                saran: ""
            }
        ];

        let filteredUlasan = [...dataUlasan];
        let visibleCount = 3; // Jumlah ulasan yang ditampilkan awal

        // ========== FUNGSI TAB ==========
        function openTab(tabName) {
            // Sembunyikan semua konten tab
            var tabContents = document.getElementsByClassName('tab-content');
            for (var i = 0; i < tabContents.length; i++) {
                tabContents[i].classList.remove('active-content');
            }

            // Hapus kelas aktif dari semua tombol tab
            var tabLinks = document.getElementsByClassName('tab-link');
            for (var i = 0; i < tabLinks.length; i++) {
                tabLinks[i].classList.remove('active');
            }

            // Tampilkan konten tab yang dipilih dan set tombolnya menjadi aktif
            if (tabName === 'tulis-ulasan') {
                document.getElementById('tulis-ulasan').classList.add('active-content');
                event.currentTarget.classList.add('active');
            } else {
                document.getElementById('lihat-ulasan').classList.add('active-content');
                event.currentTarget.classList.add('active');
                tampilkanUlasan(); // Refresh tampilan ulasan
            }
        }

        // ========== FUNGSI MENYIMPAN ULASAN ==========
        function simpanUlasan() {
            // Ambil nilai dari form
            const nama = document.getElementById('nama').value.trim();
            const email = document.getElementById('email').value.trim();
            const rating = document.querySelector('input[name="rating"]:checked')?.value || '5';
            const judul = document.getElementById('judul').value.trim();
            const ulasan = document.getElementById('ulasan').value.trim();
            const saran = document.getElementById('saran').value.trim();

            // Validasi
            if (!nama || !judul || !ulasan) {
                tampilkanAlert('Mohon isi semua kolom yang wajib diisi!', 'error');
                return;
            }

            if (ulasan.length < 10) {
                tampilkanAlert('Ulasan terlalu pendek. Minimal 10 karakter.', 'error');
                return;
            }

            // Buat ulasan baru
            const ulasanBaru = {
                id: dataUlasan.length + 1,
                nama: nama,
                inisial: nama.split(' ').map(kata => kata[0]).join('').substring(0, 2).toUpperCase(),
                rating: parseInt(rating),
                judul: judul,
                ulasan: ulasan,
                tanggal: new Date().toISOString().split('T')[0],
                helpful: 0,
                saran: saran
            };

            // Tambahkan ke data
            dataUlasan.unshift(ulasanBaru); // Tambah di awal array
            filteredUlasan = [...dataUlasan];

            // Reset form
            document.getElementById('reviewForm').reset();

            // Tampilkan alert sukses
            tampilkanAlert('Terima kasih! Ulasan Anda telah kami terima.', 'success');

            // Refresh tampilan ulasan jika tab lihat ulasan aktif
            if (document.getElementById('lihat-ulasan').classList.contains('active-content')) {
                tampilkanUlasan();
            }
        }

        function tampilkanAlert(pesan, tipe) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.style.display = 'block';
            alertDiv.className = `alert alert-${tipe}`;
            alertDiv.innerHTML = `<i class="fas ${tipe === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${pesan}`;

            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 3000);
        }

        // ========== FUNGSI MENAMPILKAN ULASAN ==========
        function tampilkanUlasan() {
            // Hitung statistik
            const totalUlasan = dataUlasan.length;
            const totalRating = dataUlasan.reduce((sum, r) => sum + r.rating, 0);
            const rataRata = (totalRating / totalUlasan).toFixed(1);

            // Hitung distribusi rating
            const ratingCounts = [0, 0, 0, 0, 0, 0]; // index 1-5
            dataUlasan.forEach(r => ratingCounts[r.rating]++);

            // Tampilkan statistik
            let statsHTML = `
                <div class="average-rating">
                    <div class="average-number">${rataRata}</div>
                    <div class="average-stars">${'★'.repeat(Math.round(rataRata))}${'☆'.repeat(5 - Math.round(rataRata))}</div>
                    <div class="total-reviews">${totalUlasan} ulasan</div>
                </div>
                <div class="rating-bars">
            `;

            for (let i = 5; i >= 1; i--) {
                const persentase = totalUlasan ? (ratingCounts[i] / totalUlasan * 100) : 0;
                statsHTML += `
                    <div class="rating-bar-item">
                        <span>${i} ★</span>
                        <div class="bar">
                            <div class="bar-fill" style="width: ${persentase}%"></div>
                        </div>
                        <span>${ratingCounts[i]}</span>
                    </div>
                `;
            }
            statsHTML += '</div>';
            document.getElementById('reviewStats').innerHTML = statsHTML;

            // Tampilkan daftar ulasan (hanya 3 pertama)
            tampilkanUlasanTerfilter();
        }

        function tampilkanUlasanTerfilter() {
            const ulasanToShow = filteredUlasan.slice(0, visibleCount);
            
            if (ulasanToShow.length === 0) {
                document.getElementById('daftarUlasan').innerHTML = '<p style="text-align: center; padding: 2rem; color: #7f8c8d;">Belum ada ulasan dengan filter ini.</p>';
                document.getElementById('loadMoreContainer').style.display = 'none';
                return;
            }

            let html = '';
            ulasanToShow.forEach(ulasan => {
                html += `
                    <div class="review-card">
                        <div class="review-header">
                            <div class="reviewer-info">
                                <div class="reviewer-avatar">${ulasan.inisial}</div>
                                <div>
                                    <div class="reviewer-name">${ulasan.nama}</div>
                                    <div class="review-date">${formatTanggal(ulasan.tanggal)}</div>
                                </div>
                            </div>
                        </div>
                        <div class="review-rating">${'★'.repeat(ulasan.rating)}${'☆'.repeat(5 - ulasan.rating)}</div>
                        <div class="review-title">${ulasan.judul}</div>
                        <div class="review-text">${ulasan.ulasan}</div>
                        <div class="review-helpful">
                            <button class="helpful-btn" onclick="helpfulClick(${ulasan.id})">
                                <i class="far fa-thumbs-up"></i> Membantu (${ulasan.helpful})
                            </button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('daftarUlasan').innerHTML = html;
            
            // Sembunyikan tombol load more jika sudah semua ditampilkan
            if (visibleCount >= filteredUlasan.length) {
                document.getElementById('loadMoreContainer').style.display = 'none';
            } else {
                document.getElementById('loadMoreContainer').style.display = 'block';
            }
        }

        function formatTanggal(tanggal) {
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return new Date(tanggal).toLocaleDateString('id-ID', options);
        }

        // ========== FILTER ULASAN ==========
        function filterUlasan(rating) {
            // Update active class
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // Filter data
            if (rating === 'semua') {
                filteredUlasan = [...dataUlasan];
            } else {
                filteredUlasan = dataUlasan.filter(r => r.rating === parseInt(rating));
            }

            visibleCount = 3;
            tampilkanUlasanTerfilter();
        }

        // ========== LOAD MORE ==========
        function loadMoreUlasan() {
            visibleCount += 3;
            tampilkanUlasanTerfilter();
        }

        // ========== HELPFUL CLICK ==========
        function helpfulClick(id) {
            const ulasan = dataUlasan.find(r => r.id === id);
            if (ulasan) {
                ulasan.helpful++;
                tampilkanUlasanTerfilter();
            }
        }

        // Inisialisasi
        window.onload = function() {
            tampilkanUlasan();
        };
    </script>
</body>
</html>
